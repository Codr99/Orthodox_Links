[workspace]
authors = ["WJ Baum <1024181+Codr99@users.noreply.github.com>"]
name = "Orthodox Links"
description = "Orthodox Christian Liturgical Resource Links."
platforms = ["linux-64"]
version = "0.1.0"
channels = [
  "conda-forge",
  "plotly"
]
channel-priority = "disabled"

[tasks]
jupyter = "jupyter lab --LabServerApp.notebook_starts_kernel=False"

[dependencies]
python = ">=3.13.5,<3.14"
swig = ">=4.3.1,<5"
